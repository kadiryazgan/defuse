<style>
  :root{
    --bg:#15121E; --panel:#211C30; --panel2:#2A2440; --text:#ECE8F4;
    --muted:#9C95B6; --amber:#F4B43C; --hair:#352E4C; --good:#34D399;
    --covered:#CFC9E0; --opened:#F1EFF7; --mine:#E5564A; --ink:#2B2740;
    --n1:#2A6DF4; --n2:#2E9E54; --n3:#E53935; --n4:#5B2EA6;
    --n5:#9A3B2E; --n6:#1597A8; --n7:#45415C; --n8:#8A8699;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{margin:0; height:100%;}
  body{
    background:var(--bg); color:var(--text);
    font-family:'Nunito',system-ui,-apple-system,"Segoe UI",sans-serif;
    display:flex; justify-content:center;
    -webkit-font-smoothing:antialiased;
  }
  #app{width:100%; max-width:460px; padding:22px; min-height:100%;
    display:flex; flex-direction:column; justify-content:center;}
  h1{font-size:30px; font-weight:800; line-height:1.05; margin:.2em 0 .4em;}
  p.lede{color:var(--muted); font-size:15px; line-height:1.45; margin:0 0 22px;}
  .eyebrow{font-size:12px; letter-spacing:.22em; text-transform:uppercase;
    color:var(--amber); font-weight:700; display:flex; align-items:center; gap:10px;}
  .eyebrow::before{content:""; width:30px; height:10px; border-radius:2px;
    background:repeating-linear-gradient(45deg,var(--amber) 0 5px,transparent 5px 10px);}

  input[type=text]{width:100%; padding:14px; border-radius:12px; border:1px solid var(--hair);
    background:var(--panel); color:var(--text); font-size:15px; font-family:inherit;}
  input::placeholder{color:var(--muted);}

  .btn{display:block; width:100%; border:0; border-radius:13px; padding:15px;
    font-size:16px; font-weight:700; font-family:inherit; cursor:pointer; text-align:center;}
  .btn-primary{background:var(--amber); color:#1A1408;}
  .btn-choice{background:var(--panel); color:var(--text); margin-top:10px;}
  .btn-choice:active{background:var(--panel2);}
  .link{background:none; border:0; color:var(--muted); font-family:inherit; font-size:14px;
    cursor:pointer; padding:12px; width:100%; margin-top:6px;}

  /* progress */
  .prog-top{display:flex; justify-content:space-between; font-size:12.5px; font-weight:700; margin-bottom:8px;}
  .prog-top .left{color:var(--muted);} .prog-top .right{color:var(--amber);}
  .prog-bar{height:7px; border-radius:4px; background:var(--panel); overflow:hidden;}
  .prog-fill{height:100%; background:var(--amber); transition:width .2s ease;}

  /* board */
  .play{flex:1; display:flex; flex-direction:column;}
  .play-mid{flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center;}
  .ptitle{font-size:22px; font-weight:800;}
  .psub{color:var(--muted); font-size:14px; margin-top:4px; margin-bottom:20px;}
  .board{display:grid; grid-template-columns:repeat(4,1fr); gap:5px;
    background:#DED9EC; padding:5px; border-radius:14px; width:min(82vw,300px);
    touch-action:none;}
  .cell{aspect-ratio:1; border-radius:9px; display:flex; align-items:center; justify-content:center;
    font-weight:800; font-size:min(8vw,30px); -webkit-user-select:none; user-select:none;}
  .cell.cov{background:var(--covered); box-shadow:inset 0 -5px 0 rgba(43,39,64,.16); cursor:pointer;}
  .cell.open{background:var(--opened);}
  .cell.mine{background:var(--mine);}
  .cell svg{width:64%; height:64%;}
  /* tutorial example pair (closed view + revealed view) */
  .expair{display:flex; gap:18px; justify-content:center; align-items:flex-start; flex-wrap:wrap;}
  .board.exb{width:132px; gap:4px; padding:4px; border-radius:10px; touch-action:auto;}
  .exb .cell{font-size:15px; border-radius:7px;}

  .center{text-align:center;}
  .time{font-size:44px; font-weight:800; color:var(--amber);}
  .bigicon{font-size:50px; line-height:1;}
  .q{font-size:20px; font-weight:800; text-align:center; margin:0 0 16px;}
  .fade{opacity:0; transition:opacity .24s ease; pointer-events:none;}
  .fade.on{opacity:1; pointer-events:auto;}
  .results-box{max-height:220px; overflow:auto; background:var(--panel); border:1px solid var(--hair);
    border-radius:12px; padding:12px; font-family:ui-monospace,monospace; font-size:11px;
    color:var(--muted); white-space:pre; margin-top:14px;}
  .toast{position:fixed; left:50%; bottom:28px; transform:translateX(-50%);
    background:var(--panel2); color:var(--text); padding:11px 18px; border-radius:10px;
    font-size:14px; opacity:0; transition:opacity .2s; pointer-events:none;}
  .toast.on{opacity:1;}
</style>
</head>

// ---- symmetry transforms (D4) -----------------------------------------------
function tIndex(i, t){
  const r = (i / SIDE) | 0, c = i % SIDE, s = SIDE - 1; let nr, nc;
  switch(t){
    case 0: nr=r; nc=c; break;            case 1: nr=c; nc=s-r; break;
    case 2: nr=s-r; nc=s-c; break;        case 3: nr=s-c; nc=r; break;
    case 4: nr=r; nc=s-c; break;          case 5: nr=s-r; nc=c; break;
    case 6: nr=c; nc=r; break;            default: nr=s-c; nc=s-r;
  }
  return nr*SIDE + nc;
}
function untIndex(d, t){ for(let j=0;j<N;j++) if(tIndex(j,t)===d) return j; return d; }
function neighbours(i){
  const x=i%SIDE, y=(i/SIDE)|0, out=[];
  for(let dy=-1;dy<=1;dy++)for(let dx=-1;dx<=1;dx++){
    if(!dx&&!dy)continue; const nx=x+dx, ny=y+dy;
    if(nx<0||ny<0||nx>=SIDE||ny>=SIDE)continue; out.push(ny*SIDE+nx);
  }
  return out;
}
function materialize(e, t){
  const numbers = new Array(N).fill(0);
  for(let i=0;i<N;i++) numbers[tIndex(i,t)] = e.numbers[i];
  return {
    mines: new Set(e.mines.map(i=>tIndex(i,t))),
    opened: new Set(e.opened.map(i=>tIndex(i,t))),
    numbers, mineCount: e.mineCount, safeCount: N - e.mineCount,
  };
}

// ---- session / playlist -----------------------------------------------------
const rnd = n => Math.floor(Math.random()*n);
function freshSession(tester){
  // Present the curated set in order (ascending score). Each board gets a random
  // rotation/flip for visual variety; the order itself is fixed.
  const core = CURATED.map(c => ({ci:c.ci, t:rnd(8), rep:false, ex:false}));
  return {
    tester: tester||'', experience: pendingExp, sessionId: crypto.randomUUID(),
    createdAt: Date.now(),
    core, extras: [], extrasUnlocked:false, results:[], score:0,
  };
}
const active = s => s.core;
const save = () => localStorage.setItem(LS_KEY, JSON.stringify(SESSION));
function load(){ try{ return JSON.parse(localStorage.getItem(LS_KEY)); }catch(e){ return null; } }

// ---- Supabase (best-effort, idempotent via row id; 409 = already stored) ----
async function postRow(r){
  const resp = await fetch(`${SUPABASE_URL}/rest/v1/study_ratings`, {
    method:'POST',
    headers:{ apikey:SUPABASE_KEY, Authorization:`Bearer ${SUPABASE_KEY}`,
      'Content-Type':'application/json', Prefer:'return=minimal' },
    body: JSON.stringify({
      id:r.id, session_id:SESSION.sessionId, tester:SESSION.tester||null,
      experience:SESSION.experience||null,
      catalog_index:r.ci, transform:r.t, is_repeat:r.rep, is_extra:r.ex,
      rating:r.rating, solved:r.solved, time_ms:r.timeMs, mine_hits:r.mineHits,
      taps:r.taps, events:r.events, app_version:APP_VERSION,
    }),
  });
  return resp.ok || resp.status === 409;
}
async function flush(){
  if(!SUPABASE_URL || !SESSION) return;
  for(const r of SESSION.results){
    if(r.synced) continue;
    try{ if(await postRow(r)){ r.synced=true; save(); } }catch(e){ /* offline → retry next time */ }
  }
}

// ---- state ------------------------------------------------------------------
let SESSION = null, phase = 'intro';
let board=null, revealed=null, shownAt=0, exploded=-1, busy=false, curT=0;
let taps=0, mineHits=0, events=[], choicesReady=false, solvedTime=0, solvedFlag=false, lastEarned=0;
let pendingName='', pendingExp=null; // collected before the session is created
let tutStep=0; // which annotated example is showing
let mineHit=false; // holding the "Mayına bastın!" banner until the player retries
const sleep = ms => new Promise(r=>setTimeout(r,ms));
const curItem = () => active(SESSION)[SESSION.cursorPos];
// A fixed easy board for the tutorial practice (deterministic).
const TUT = CATALOG.find(e=>e.core && e.tier===0 && e.toClear<=3) || CATALOG[0];

function nextPhase(){
  const s = SESSION; s.cursorPos = s.results.length;
  if(s.cursorPos < active(s).length){ beginBoard(); return; }
  if(!s.extrasUnlocked && s.extras.length){ phase='coreDone'; render(); return; }
  phase='done'; render();
}
function resetBoardRuntime(){
  revealed = new Set(board.opened);
  exploded=-1; busy=false; taps=0; mineHits=0; events=[]; mineHit=false;
  solvedFlag=false; solvedTime=0; choicesReady=false; shownAt=Date.now();
}
function beginBoard(){
  const it = active(SESSION)[SESSION.cursorPos];
  curT = it.t;
  board = materialize(CATALOG[it.ci], it.t);
  resetBoardRuntime();
  phase='playing'; render();
}
function beginTutorial(){
  curT = 0;
  board = materialize(TUT, 0);
  resetBoardRuntime();
  phase='tutPlay'; render();
}
function retryBoard(){
  revealed = new Set(board.opened); exploded=-1; busy=false; mineHit=false; render();
}

function floodRings(start){
  const visited=new Set([start]), rings=[]; let frontier=[start];
  while(frontier.length){
    rings.push(frontier); const next=[];
    for(const c of frontier){
      if(board.numbers[c]!==0) continue;
      for(const nb of neighbours(c)) if(!visited.has(nb)&&!revealed.has(nb)){ visited.add(nb); next.push(nb); }
    }
    frontier=next;
  }
  return rings;
}

async function onCell(d){
  if(busy || (phase!=='playing' && phase!=='tutPlay') || revealed.has(d)) return;
  const ms = Date.now()-shownAt;
  const isMine = board.mines.has(d);
  taps++;
  events.push({c: untIndex(d, curT), t: ms, m: isMine?1:0});
  if(isMine){
    // Hold on the explosion until the player taps "Tekrar dene" — no auto-reset.
    mineHits++; busy=true; exploded=d; mineHit=true;
    if(phase==='playing'){ SESSION.score=(SESSION.score||0)-5; save(); }  // -5 per mine step
    render();
    return;
  }
  busy=true;
  const rings = floodRings(d);
  for(let k=0;k<rings.length;k++){
    rings[k].forEach(c=>revealed.add(c)); render();
    if(k+1<rings.length) await sleep(26);
  }
  busy=false;
  if(revealed.size >= board.safeCount) solved();
}
// Swipe-to-reveal: drag a finger/cursor across covered cells to open them,
// matching the real game (tap + pan). Listeners live on `document` (registered
// once) rather than the board, because every reveal re-renders the board and
// would otherwise drop the gesture mid-swipe. elementFromPoint resolves the
// cell under the pointer against the freshly rendered DOM.
let pointerDown=false;
const swipeable = () => phase==='playing' || phase==='tutPlay';
function boardHit(x,y){
  const el=document.elementFromPoint(x,y);
  const c=el&&el.closest&&el.closest('.cov');
  if(c) onCell(+c.dataset.i);
}
function initSwipe(){
  document.addEventListener('pointerdown', e=>{
    if(!swipeable() || !(e.target.closest&&e.target.closest('.board'))) return;
    pointerDown=true; boardHit(e.clientX,e.clientY);
  });
  document.addEventListener('pointermove', e=>{ if(pointerDown && swipeable()) boardHit(e.clientX,e.clientY); });
  const up=()=>{ pointerDown=false; };
  document.addEventListener('pointerup', up);
  document.addEventListener('pointercancel', up);
}
function solved(){
  solvedTime = Date.now()-shownAt;
  if(phase==='tutPlay'){ phase='tutDone'; render(); return; }
  lastEarned = board.mineCount*10;                       // clear bonus = mines × 10
  SESSION.score=(SESSION.score||0)+lastEarned; save();
  solvedFlag=true; phase='solved'; choicesReady=false; render();
  setTimeout(()=>{ if(phase==='solved'){ choicesReady=true; render(); } }, 500);
}
function giveUp(){ solvedFlag=false; commit(0); }
function commit(rating){
  const it = curItem();
  SESSION.results.push({
    id: crypto.randomUUID(), ci:it.ci, t:it.t, rep:it.rep, ex:it.ex,
    rating, solved:solvedFlag, timeMs: solvedFlag?solvedTime:(Date.now()-shownAt),
    mineHits, taps, events, synced:false,
  });
  save(); flush();
  nextPhase();
}
function unlockExtras(yes){
  if(yes){ SESSION.extrasUnlocked=true; save(); nextPhase(); }
  else { phase='done'; render(); }
}

// ---- views ------------------------------------------------------------------
const MINE_SVG = (col)=>`<svg viewBox="0 0 24 24"><g stroke="${col}" stroke-width="2" stroke-linecap="round">`+
  [0,1,2,3,4,5,6,7].map(k=>{const a=k*Math.PI/4;return `<line x1="12" y1="12" x2="${(12+Math.cos(a)*9).toFixed(1)}" y2="${(12+Math.sin(a)*9).toFixed(1)}"/>`}).join('')+
  `</g><circle cx="12" cy="12" r="5" fill="${col}"/></svg>`;
const NUMCOL=[null,'var(--n1)','var(--n2)','var(--n3)','var(--n4)','var(--n5)','var(--n6)','var(--n7)','var(--n8)'];

function boardHTML(){
  let h='<div class="board" id="board">';
  for(let i=0;i<N;i++){
    if(i===exploded){ h+=`<div class="cell mine">${MINE_SVG('#fff')}</div>`; continue; }
    if(revealed.has(i)){
      const n=board.numbers[i];
      h+=`<div class="cell open">${n?`<span style="color:${NUMCOL[n]}">${n}</span>`:''}</div>`;
    } else {
      h+=`<div class="cell cov" data-i="${i}"></div>`;
    }
  }
  return h+'</div>';
}
function fmtTime(ms){ return (ms/1000).toFixed(1).replace('.', ','); }
const mineBanner = () => mineHit ? `<div style="margin-top:20px;text-align:center">
    <div style="color:var(--mine);font-weight:800;font-size:17px;margin-bottom:12px">💥 Mayına bastın!</div>

function tutLegend(){
  const cell=(cls,inner)=>`<div class="cell ${cls}" style="width:46px;height:46px;aspect-ratio:auto;font-size:22px">${inner}</div>`;
  const item=(c,l)=>`<div style="display:flex;flex-direction:column;align-items:center;gap:7px">${c}<span style="color:var(--muted);font-size:11px">${l}</span></div>`;
  return `<div style="display:flex;justify-content:center;gap:24px;margin:6px 0 20px">
    ${item(cell('cov',''),'kapalı')}
    ${item(cell('open','<span style="color:var(--n1)">1</span>'),'1 mayın komşu')}
    ${item(cell('mine',MINE_SVG('#fff')),'mayın')}
  </div>`;
}
// Build an example layout from just its mine positions (numbers + opening flood
// computed the same way the real generator does).
function buildEx(mines){
  const ms=new Set(mines), nums=new Array(N).fill(0);
  for(let i=0;i<N;i++){ if(ms.has(i))continue; nums[i]=neighbours(i).filter(n=>ms.has(n)).length; }
  let best=new Set(), seen=new Set();
  for(let i=0;i<N;i++){
    if(ms.has(i)||nums[i]!==0||seen.has(i))continue;
    const reg=new Set(), st=[i];
    while(st.length){ const x=st.pop(); if(reg.has(x))continue; reg.add(x);
      if(nums[x]===0) for(const nb of neighbours(x)) if(!reg.has(nb)) st.push(nb); }
    reg.forEach(c=>seen.add(c));
    if(reg.size>best.size) best=reg;
  }
  return {mines, numbers:nums, opened:[...best], mineCount:mines.length, toClear:N-mines.length-best.size};
}
// Annotated examples — layouts shown two ways: the closed view a player sees
// (OYUNDA) and the revealed view with the mines (MAYINLAR).
const _ez = CATALOG.filter(x=>x.core && x.tier===0);
const EXAMPLES = [
  { e: _ez.find(x=>x.toClear<=3) || _ez[0],
    title:'Aynı tahta, iki görünüm',
    body:'Solda oyunda gördüğün hâli — bazı kareler kapalı. Sağda altındaki mayınlar. Açık sayılar mayınların yerini ele verir; sen <b>mayına basmadan</b> kapalı (yeşil) güvenli kareleri açarsın.' },
  { e: _ez.find(x=>x.toClear>=4) || _ez[1] || _ez[0],
    title:'Sayıları oku, güvenliyi bul',
    body:'Bir karedeki sayı, ona komşu mayın adedidir. Bu ipuçlarını birleştirip hangi kapalı karelerin güvenli olduğunu çözer, sadece onlara dokunursun.' },
  { e: buildEx([4,5,6]),
    title:'Bitişik mayınlar büyük sayı yapar',
    body:'Mayınlar yan yana olunca komşu kareler daha büyük sayılar gösterir — ortadaki “3”, ona değen üç mayını birden sayıyor. Yine hepsine basmadan güvenli kareleri açarsın.' },
];
function exBoard(e, revealed){
  const ms=new Set(e.mines), op=new Set(e.opened);
  let h='<div class="board exb">';
  for(let i=0;i<N;i++){
    if(revealed){
      if(ms.has(i)){ h+=`<div class="cell mine">${MINE_SVG('#fff')}</div>`; continue; }
      const n=e.numbers[i], ring = op.has(i)?'':'box-shadow:0 0 0 3px var(--good) inset;';
      h+=`<div class="cell open" style="${ring}">${n?`<span style="color:${NUMCOL[n]}">${n}</span>`:''}</div>`;
    } else {
      if(op.has(i)){ const n=e.numbers[i]; h+=`<div class="cell open">${n?`<span style="color:${NUMCOL[n]}">${n}</span>`:''}</div>`; }
      else h+=`<div class="cell cov"></div>`;
    }
  }
  return h+'</div>';
}
function exampleHTML(ex){
  const panel=(lbl,inner)=>`<div style="text-align:center"><div style="color:var(--muted);font-size:11px;font-weight:800;letter-spacing:1.5px;margin-bottom:8px">${lbl}</div>${inner}</div>`;
  return `<div class="expair">${panel('OYUNDA', exBoard(ex.e,false))}${panel('MAYINLAR', exBoard(ex.e,true))}</div>`;
}

function render(){

  if(phase==='intro'){
    const s = load();
    const resumable = s && s.results && s.results.length>0 &&
      s.results.length < (s.extrasUnlocked ? s.core.length+s.extras.length : s.core.length);
    h += `<div class="eyebrow">kör zorluk testi</div>
      <h1>Bu mayın tahtalarını değerlendir</h1>
      <p class="lede">Her tahtayı temizle: güvenli kareleri tıkla; sayılar bir kareye kaç mayının
      komşu olduğunu söyler. Mayına basarsan tahta sıfırlanır — temizlenene kadar dene, sonra ne
      kadar zor olduğunu söyle. Süre yok; rahatça oyna.</p>`;
    if(resumable){
      const done=s.results.length, tot=(s.extrasUnlocked? s.core.length+s.extras.length : s.core.length);
      h += `<button class="btn btn-primary" id="resume">Devam et · ${done}/${tot} tamam</button>
        <button class="link" id="restart">Baştan başla</button>`;
    } else {
      h += `<input type="text" id="name" placeholder="Adın veya baş harflerin (isteğe bağlı)">

        <button class="btn btn-primary" id="start">Başla</button>`;
    }
  }
  else if(phase==='experience'){
    h += `<div class="eyebrow">kısa soru</div>
      <h1>Daha önce Mayın Tarlası oynadın mı?</h1>
      <p class="lede">Sadece veriyi gruplamak için — doğru ya da yanlış cevap yok.</p>

      <p class="lede">Temel set bu kadar. ${SESSION.extras.length} ekstra tahta daha ister misin?
      İsteğe bağlı — değerlendirmelerin kaydedildi.</p>
      <button class="btn btn-primary" id="more">Devam et — ekstra tahtalar</button>
      <button class="link" id="finish">Bitirdim — sonuçlarımı göster</button>
    </div>`;
  }
  else if(phase==='done'){
    const solved=SESSION.results.filter(r=>r.solved).length;
    h += `<div class="center">
      <div class="bigicon" style="color:var(--good)">✓</div>
      <h1 style="margin-top:10px">Teşekkürler!</h1>
      <div style="color:var(--amber);font-weight:800;font-size:30px;margin:6px 0">${SESSION.score||0} ⭐</div>
      <p class="lede">${SESSION.results.length} tahta değerlendirildi · ${solved} temizlendi.

      <button class="btn btn-primary" id="copy">Sonuçları kopyala</button>
      <div class="results-box" id="rbox">${escapeHtml(exportJson())}</div>
    </div>`;
  }
  app.innerHTML = h;
  wire();
}
function escapeHtml(s){ return s.replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c])); }
function exportJson(){
  return JSON.stringify({
    tester: SESSION.tester, experience: SESSION.experience,
    sessionId: SESSION.sessionId, createdAt: SESSION.createdAt, app: APP_VERSION,
    results: SESSION.results.map(r=>({ci:r.ci,t:r.t,rep:r.rep,ex:r.ex,rating:r.rating,
      solved:r.solved,timeMs:r.timeMs,mineHits:r.mineHits,taps:r.taps,events:r.events})),
  }, null, 2);
}

function wire(){
  const $=id=>document.getElementById(id);
  if(phase==='intro'){
    if($('start')) $('start').onclick=()=>{ pendingName=$('name').value; phase='experience'; render(); };
    if($('resume')) $('resume').onclick=()=>{ SESSION=load(); SESSION.cursorPos=SESSION.results.length; flush(); nextPhase(); };
    if($('restart')) $('restart').onclick=()=>{ localStorage.removeItem(LS_KEY); render(); };
  }
  else if(phase==='experience'){
    document.querySelectorAll('[data-x]').forEach(b=> b.onclick=()=>{ pendingExp=b.dataset.x; phase='tutInfo'; render(); });
  }
  else if(phase==='tutInfo'){ $('tryit').onclick=()=>{ tutStep=0; phase='tutEx'; render(); }; }
  else if(phase==='tutEx'){
    $('exnext').onclick=()=>{ if(tutStep<EXAMPLES.length-1){ tutStep++; render(); } else beginTutorial(); };
  }
  else if(phase==='tutPlay'){
    if($('retry')) $('retry').onclick=retryBoard;
  }
  else if(phase==='tutDone'){
    $('begin').onclick=()=>{ SESSION=freshSession(pendingName); save(); nextPhase(); };
  }
  else if(phase==='playing'){
    if($('retry')) $('retry').onclick=retryBoard;
    $('giveup').onclick=giveUp;
  }
  else if(phase==='solved'){
    if($('cont')) $('cont').onclick=()=>commit(-1);  // -1 = no subjective rating collected
  }
  else if(phase==='coreDone'){
    $('more').onclick=()=>unlockExtras(true);
    $('finish').onclick=()=>unlockExtras(false);
  }
  else if(phase==='done'){
    $('copy').onclick=async()=>{
      try{ await navigator.clipboard.writeText(exportJson()); toast('Sonuçlar kopyalandı'); }
      catch(e){ const r=$('rbox'); const sel=window.getSelection(); sel.removeAllRanges();
        const range=document.createRange(); range.selectNodeContents(r); sel.addRange(range);
        toast('Kutudaki metni seçip kopyala'); }
    };
  }
}
let toastT;
function toast(msg){ const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('on');
  clearTimeout(toastT); toastT=setTimeout(()=>t.classList.remove('on'),2200); }

// ---- boot -------------------------------------------------------------------
SESSION = load();  // load any prior session so leftover unsynced rows can retry
initSwipe();       // swipe-to-reveal listeners (document-level, once)
render();          // intro re-reads storage itself to decide resume vs. fresh
flush();
</script>
